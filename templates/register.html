{% extends "base.html" %}
{% block title %}Create Account - Book Buddy{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4 py-12 relative overflow-hidden">
    
    <div class="absolute top-0 right-0 -mr-32 -mt-32 w-[500px] h-[500px] rounded-full bg-brandNavy/5 blur-[100px] pointer-events-none"></div>
    <div class="absolute bottom-0 left-0 -ml-32 -mb-32 w-[400px] h-[400px] rounded-full bg-brandMaroon/5 blur-[100px] pointer-events-none"></div>

    <div class="max-w-md w-full bg-white rounded-[3rem] shadow-[0_20px_60px_rgb(22,32,84,0.05)] border border-brandNavy/5 p-10 sm:p-12 relative z-10 transition-all duration-500 hover:shadow-[0_20px_60px_rgb(22,32,84,0.08)]">
        
        <div class="text-center mb-10">
            <div class="w-20 h-20 bg-brandNavy/5 rounded-[2rem] flex items-center justify-center mx-auto mb-6 shadow-inner border border-brandNavy/10">
                <i class="fa-solid fa-user-plus text-brandNavy text-3xl"></i>
            </div>
            <h1 class="text-3xl font-serif font-bold text-brandNavy tracking-tight mb-2">Create Account</h1>
            <p class="text-brandNavy/50 font-medium text-sm">Publish and share your private flipbooks</p>
        </div>

        <form method="POST" class="space-y-6">
            
            <div>
                <label for="username" class="block text-[10px] font-bold uppercase tracking-widest text-brandNavy/50 mb-3 ml-1">Username</label>
                <div class="relative group">
                    <i class="fa-solid fa-at absolute left-5 top-1/2 -translate-y-1/2 text-brandNavy/30 group-focus-within:text-brandMaroon transition-colors"></i>
                    <input type="text" name="username" id="username" required
                        class="w-full bg-[#F8FAFC] border border-brandNavy/10 focus:border-brandMaroon focus:ring-4 focus:ring-brandMaroon/10 focus:bg-white rounded-2xl py-4 pl-14 pr-6 outline-none transition-all font-medium text-brandNavy placeholder-brandNavy/30"
                        placeholder="Choose a username">
                </div>
            </div>

            <div>
                <label for="password" class="block text-[10px] font-bold uppercase tracking-widest text-brandNavy/50 mb-3 ml-1">Password</label>
                <div class="relative group">
                    <i class="fa-solid fa-lock absolute left-5 top-1/2 -translate-y-1/2 text-brandNavy/30 group-focus-within:text-brandMaroon transition-colors"></i>
                    <input type="password" name="password" id="password" required
                        class="w-full bg-[#F8FAFC] border border-brandNavy/10 focus:border-brandMaroon focus:ring-4 focus:ring-brandMaroon/10 focus:bg-white rounded-2xl py-4 pl-14 pr-6 outline-none transition-all font-medium text-brandNavy placeholder-brandNavy/30"
                        placeholder="At least 6 characters">
                </div>
            </div>

            <div>
                <label for="confirm_password" class="block text-[10px] font-bold uppercase tracking-widest text-brandNavy/50 mb-3 ml-1">Confirm Password</label>
                <div class="relative group">
                    <i class="fa-solid fa-check-double absolute left-5 top-1/2 -translate-y-1/2 text-brandNavy/30 group-focus-within:text-brandMaroon transition-colors"></i>
                    <input type="password" name="confirm_password" id="confirm_password" required
                        class="w-full bg-[#F8FAFC] border border-brandNavy/10 focus:border-brandMaroon focus:ring-4 focus:ring-brandMaroon/10 focus:bg-white rounded-2xl py-4 pl-14 pr-6 outline-none transition-all font-medium text-brandNavy placeholder-brandNavy/30"
                        placeholder="Repeat your password">
                </div>
            </div>

            {% if error %}
            <div class="bg-red-50 text-red-600 p-4 rounded-xl text-sm font-medium flex items-center gap-3 animate-shake border border-red-100 shadow-sm">
                <i class="fa-solid fa-circle-exclamation shrink-0"></i>
                {{ error }}
            </div>
            {% endif %}

            <button type="submit"
                class="w-full bg-brandNavy hover:bg-brandMaroon text-white py-4 rounded-2xl font-bold shadow-xl shadow-brandNavy/10 transition-all duration-300 active:scale-[0.98] flex items-center justify-center gap-3 group">
                Create Account
                <i class="fa-solid fa-arrow-right text-sm group-hover:translate-x-1 transition-transform"></i>
            </button>
        </form>

        <div class="mt-10 pt-8 border-t border-brandNavy/5 text-center space-y-6">
            <p class="text-xs font-medium text-brandNavy/50">
                Already have an account? 
                <a href="{{ url_for('login') }}" class="font-bold text-brandMaroon hover:text-brandNavy transition-colors ml-1">Sign in now</a>
            </p>
            
            <a href="{{ url_for('index') }}" class="text-[10px] font-bold text-brandNavy/40 hover:text-brandNavy transition-colors uppercase tracking-widest flex items-center justify-center gap-2 w-max mx-auto">
                <i class="fa-solid fa-chevron-left"></i>
                Return to Site
            </a>
        </div>
    </div>
</div>

<style>
@keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
}
.animate-shake {
    animation: shake 0.2s ease-in-out 0s 2;
}
</style>
{% endblock %}
