{% extends "base.html" %}
{% block content %}
<div class="min-h-screen flex items-center justify-center bg-[#f8f9fa] px-4">
    <div class="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-white p-12 transition-all hover:shadow-blue-500/5">
        <div class="text-center mb-10">
            <div class="w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-blue-600/20">
                <i class="fas fa-user-plus text-white text-3xl"></i>
            </div>
            <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight mb-2">Create Account</h1>
            <p class="text-gray-500 font-medium">Upload private flipbooks and share them with unique links.</p>
        </div>

        <form method="POST" class="space-y-6">
            <div>
                <label for="username" class="block text-xs font-black uppercase tracking-widest text-gray-400 mb-3 ml-1">Username</label>
                <div class="relative">
                    <i class="fas fa-at absolute left-5 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="text" name="username" id="username" required
                        class="w-full bg-gray-50 border-2 border-transparent focus:border-blue-500 focus:bg-white rounded-2xl py-4 pl-14 pr-6 outline-none transition-all font-medium text-gray-900"
                        placeholder="Choose a username">
                </div>
            </div>

            <div>
                <label for="password" class="block text-xs font-black uppercase tracking-widest text-gray-400 mb-3 ml-1">Password</label>
                <div class="relative">
                    <i class="fas fa-lock absolute left-5 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="password" name="password" id="password" required
                        class="w-full bg-gray-50 border-2 border-transparent focus:border-blue-500 focus:bg-white rounded-2xl py-4 pl-14 pr-6 outline-none transition-all font-medium text-gray-900"
                        placeholder="At least 6 characters">
                </div>
            </div>

            <div>
                <label for="confirm_password" class="block text-xs font-black uppercase tracking-widest text-gray-400 mb-3 ml-1">Confirm Password</label>
                <div class="relative">
                    <i class="fas fa-check absolute left-5 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="password" name="confirm_password" id="confirm_password" required
                        class="w-full bg-gray-50 border-2 border-transparent focus:border-blue-500 focus:bg-white rounded-2xl py-4 pl-14 pr-6 outline-none transition-all font-medium text-gray-900"
                        placeholder="Repeat your password">
                </div>
            </div>

            {% if error %}
            <div class="bg-red-50 text-red-600 p-4 rounded-xl text-sm font-bold flex items-center gap-3">
                <i class="fas fa-exclamation-circle"></i>
                {{ error }}
            </div>
            {% endif %}

            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-bold shadow-xl transition-all active:scale-[0.98] flex items-center justify-center gap-2 group">
                Create Account
                <i class="fas fa-arrow-right text-xs group-hover:translate-x-1 transition-transform"></i>
            </button>
        </form>

        <div class="mt-10 pt-8 border-t border-gray-100 text-center space-y-4">
            <a href="{{ url_for('login') }}" class="block text-xs font-bold text-blue-600 hover:text-blue-700 transition-colors uppercase tracking-widest">
                Already have an account?
            </a>
            <a href="{{ url_for('index') }}" class="text-xs font-bold text-gray-400 hover:text-blue-600 transition-colors uppercase tracking-widest flex items-center justify-center gap-2">
                <i class="fas fa-chevron-left"></i>
                Back to Site
            </a>
        </div>
    </div>
</div>
{% endblock %}
